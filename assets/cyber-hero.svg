<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070B"/>
      <stop offset="1" stop-color="#0C1824"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="120" x2="1080" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FDFF"/>
      <stop offset="0.5" stop-color="#86DFFF"/>
      <stop offset="1" stop-color="#C7F1FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#163247" stroke-width="1" opacity="0.48"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="28" fill="url(#grid)" opacity="0.72"/>

  <circle cx="180" cy="80" r="72" fill="#7DDCFF" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1010" cy="290" r="88" fill="#EEF9FF" opacity="0.06" filter="url(#glow)"/>

  <g opacity="0.92" stroke="url(#line)" stroke-width="2.5" filter="url(#glow)">
    <path d="M90 285C205 210 287 225 380 162C470 101 578 104 690 166C792 222 890 235 1110 132" stroke-dasharray="10 14">
      <animate attributeName="stroke-dashoffset" values="0;-180" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M120 120C280 170 360 115 474 180C598 250 714 252 816 197C907 147 1000 123 1080 170" stroke-dasharray="8 16">
      <animate attributeName="stroke-dashoffset" values="0;160" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <rect x="72" y="54" width="170" height="42" rx="12" fill="#09131D" stroke="#86DFFF" stroke-opacity="0.48"/>
  <text x="93" y="80" fill="#F3FCFF" font-family="Verdana, Arial, sans-serif" font-size="17" font-weight="700">OWINOVATIVE</text>

  <g filter="url(#glow)">
    <text x="600" y="165" text-anchor="middle" fill="#DDF6FF" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="5">SOFTWARE ENGINEER</text>
    <text x="600" y="220" text-anchor="middle" fill="#FFFFFF" font-family="Verdana, Arial, sans-serif" font-size="52" font-weight="900">Vincent Owino</text>
    <text x="600" y="262" text-anchor="middle" fill="#B8EBFF" font-family="Verdana, Arial, sans-serif" font-size="21" font-weight="600">Building strong systems, clean websites, and powerful tools</text>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" opacity="0.95">
    <text x="92" y="330" fill="#9FE7FF">SYSTEMS</text>
    <text x="560" y="330" fill="#FFFFFF">DESIGN</text>
    <text x="1010" y="330" text-anchor="end" fill="#D7F4FF">EXECUTION</text>
  </g>

  <rect x="22" y="22" width="1156" height="336" rx="24" stroke="#86DFFF" stroke-opacity="0.36" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.22;0.58;0.22" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
